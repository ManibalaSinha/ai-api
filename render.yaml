services:
  - type: web
    name: caption-summarizer-api
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -k uvicorn.workers.UvicornWorker app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11

      - key: OPENAI_API_KEY
        sync: false

      - key: LANGCHAIN_API_KEY
        sync: false

      - key: LANGCHAIN_TRACING_V2
        value: "true"
